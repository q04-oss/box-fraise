<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>box fraise — shop</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #FFFFFF;
      --text:   #1C1C1E;
      --muted:  #8E8E93;
      --border: #E5E1DA;
      --card:   #F7F5F2;
    }
    html {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    body { min-height: 100dvh; }
    main {
      width: 100%;
      max-width: 580px;
      margin-inline: auto;
      padding-inline: clamp(1.5rem, 6vw, 4rem);
      padding-block: clamp(3rem, 8vw, 5rem);
    }
    nav { margin-bottom: 3rem; }
    nav a {
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      text-decoration: none;
      color: var(--muted);
    }
    nav a:hover { color: var(--text); }
    .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      margin-bottom: 2.5rem;
    }
    hr { border: none; border-top: 1px solid var(--border); margin-block: 2rem; }
    .product {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-block: 1.25rem;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
    }
    .product:first-of-type { border-top: 1px solid var(--border); }
    .product-name {
      font-size: 0.85rem;
      font-weight: 500;
    }
    .product-desc {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }
    .product-price {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .cta {
      margin-top: 2.5rem;
    }
    .btn {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 0.55rem 1.25rem;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s;
    }
    .btn:hover {
      border-color: var(--text);
      background: var(--card);
    }
    footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <nav><a href="/">← box fraise</a></nav>

    <div class="eyebrow">pre-order</div>
    <h1>shop</h1>

    <div class="product">
      <div>
        <div class="product-name">digital sticker</div>
        <div class="product-desc">delivered instantly in-app. collect locations, send to friends.</div>
      </div>
      <div class="product-price">CA$3.00</div>
    </div>

    <div class="product">
      <div>
        <div class="product-name">physical sticker pack</div>
        <div class="product-desc">die-cut vinyl. weatherproof. mailed to the recipient.</div>
      </div>
      <div class="product-price">CA$14.00</div>
    </div>

    <div class="product">
      <div>
        <div class="product-name">digital + physical</div>
        <div class="product-desc">both together.</div>
      </div>
      <div class="product-price">CA$16.00</div>
    </div>

    <div class="cta">
      <a href="https://testflight.apple.com/join/zJG1Wc5Y" class="btn">get the app →</a>
    </div>

    <footer>box fraise &nbsp;·&nbsp; fraise.box &nbsp;·&nbsp; 2026</footer>
  </main>
</body>
</html>
