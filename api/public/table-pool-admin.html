<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>table · pool admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#fff; --text:#1A1A18; --muted:#8A8880; --border:#E2DDD6; --card:#F7F5F2; }
    html { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; font-size:14px; -webkit-font-smoothing:antialiased; }
    body { min-height:100dvh; }
    main { max-width:640px; margin-inline:auto; padding:clamp(2rem,8vw,4rem) clamp(1.5rem,6vw,3rem); }

    nav { margin-bottom:2.5rem; }
    nav a { font-size:0.72rem; color:var(--muted); text-decoration:none; letter-spacing:0.04em; }
    nav a:hover { color:var(--text); }

    h1 { font-size:1rem; font-weight:500; margin-bottom:0.35rem; }
    .sub { font-size:0.72rem; color:var(--muted); margin-bottom:2.5rem; }

    /* Auth */
    .auth-form { display:flex; flex-direction:column; gap:0.75rem; max-width:320px; }
    .field label { font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:0.25rem; }
    .field input, .field select {
      width:100%; font-family:inherit; font-size:0.85rem;
      background:var(--card); border:1px solid var(--border); border-radius:8px;
      padding:0.6rem 0.85rem; color:var(--text); outline:none;
    }
    .field input:focus { border-color:var(--text); background:var(--bg); }

    .btn {
      font-family:inherit; font-size:0.72rem; letter-spacing:0.06em; text-transform:uppercase;
      background:var(--text); color:var(--bg); border:none; border-radius:9999px;
      padding:0.6rem 1.5rem; cursor:pointer; transition:opacity 0.15s; align-self:flex-start;
    }
    .btn:hover { opacity:0.8; }
    .btn:disabled { opacity:0.4; cursor:not-allowed; }
    .btn-ghost {
      background:none; color:var(--text); border:1px solid var(--border);
    }
    .btn-ghost:hover { border-color:var(--text); opacity:1; }

    /* Stats bar */
    .stats { display:flex; gap:2rem; margin-bottom:2rem; }
    .stat-val { font-size:1.5rem; font-weight:500; }
    .stat-label { font-size:0.62rem; color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; margin-top:0.2rem; }

    /* Call form */
    .call-section {
      background:var(--card); border-radius:12px; padding:1.25rem;
      margin-bottom:2rem; display:flex; flex-direction:column; gap:0.75rem;
    }
    .call-section h2 { font-size:0.72rem; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); }
    .call-row { display:flex; gap:0.75rem; align-items:flex-end; flex-wrap:wrap; }
    .call-row .field { flex:1; min-width:80px; }
    .call-row .field.wide { flex:3; }
    #call-result { font-size:0.72rem; color:var(--muted); display:none; }
    #call-result.on { display:block; }

    /* Member list */
    .member-list { display:flex; flex-direction:column; }
    .member {
      display:grid; grid-template-columns:1fr auto auto;
      gap:0.25rem 1rem; padding:0.85rem 0;
      border-top:1px solid var(--border); align-items:center;
    }
    .member:last-child { border-bottom:1px solid var(--border); }
    .member-name { font-size:0.8rem; }
    .member-email { font-size:0.65rem; color:var(--muted); }
    .member-meta { font-size:0.65rem; color:var(--muted); text-align:right; }
    .member-status {
      font-size:0.6rem; letter-spacing:0.08em; text-transform:uppercase;
      padding:0.2rem 0.6rem; border-radius:9999px;
    }
    .member-status.waiting { background:#f0f0ec; color:var(--muted); }
    .member-status.called  { background:#fef3cd; color:#856404; }
    .member-status.attended{ background:#d4edda; color:#155724; }
    .member-actions { display:flex; gap:0.5rem; }
    .act-btn {
      font-family:inherit; font-size:0.6rem; letter-spacing:0.04em;
      background:none; border:1px solid var(--border); border-radius:9999px;
      padding:0.2rem 0.6rem; cursor:pointer; color:var(--muted); transition:all 0.15s;
    }
    .act-btn:hover { border-color:var(--text); color:var(--text); }

    .empty { padding:2rem 0; font-size:0.78rem; color:var(--muted); border-top:1px solid var(--border); }

    /* Slug switcher */
    .slug-switcher { margin-bottom:2rem; }
    .slug-pills { display:flex; flex-wrap:wrap; gap:0.5rem; margin-top:0.75rem; }
    .slug-pill {
      font-family:inherit; font-size:0.65rem; letter-spacing:0.04em;
      background:none; border:1px solid var(--border); border-radius:9999px;
      padding:0.25rem 0.75rem; cursor:pointer; color:var(--muted); transition:all 0.15s;
    }
    .slug-pill:hover, .slug-pill.active { border-color:var(--text); color:var(--text); }

    .err { font-size:0.72rem; color:#c0392b; margin-top:0.5rem; }
    #board { display:none; }
    #board.on { display:block; }
  </style>
</head>
<body>
<main>
  <nav><a href="/table">← table</a></nav>

  <h1>pool admin</h1>
  <p class="sub">manage the waiting pool for each venue.</p>

  <!-- Auth -->
  <div id="auth-section">
    <form class="auth-form" id="auth-form">
      <div class="field">
        <label for="pin-input">admin pin</label>
        <input type="password" id="pin-input" placeholder="••••" autocomplete="off" />
      </div>
      <button type="submit" class="btn">enter</button>
      <div class="err" id="auth-err" style="display:none;"></div>
    </form>
  </div>

  <!-- Board (shown after auth) -->
  <div id="board">
    <!-- Slug switcher -->
    <div class="slug-switcher" id="slug-switcher" style="display:none;">
      <div style="font-size:0.62rem;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;">venues</div>
      <div class="slug-pills" id="slug-pills"></div>
    </div>

    <!-- Manual slug entry -->
    <div class="auth-form" id="slug-form" style="margin-bottom:2rem;">
      <div class="field">
        <label for="slug-input">venue slug</label>
        <input type="text" id="slug-input" placeholder="e.g. kommune" autocomplete="off" spellcheck="false" />
      </div>
      <button type="button" class="btn" id="load-btn">load pool</button>
    </div>

    <!-- Stats -->
    <div id="pool-content" style="display:none;">
      <div class="stats">
        <div>
          <div class="stat-val" id="stat-waiting">—</div>
          <div class="stat-label">waiting</div>
        </div>
        <div>
          <div class="stat-val" id="stat-total">—</div>
          <div class="stat-label">total</div>
        </div>
      </div>

      <!-- Send a call -->
      <div class="call-section">
        <h2>send a call</h2>
        <div class="call-row">
          <div class="field">
            <label for="call-seats">seats</label>
            <input type="number" id="call-seats" value="8" min="1" max="200" />
          </div>
          <div class="field wide">
            <label for="call-note">note (optional)</label>
            <input type="text" id="call-note" placeholder="dinner, this saturday, details to follow" autocomplete="off" />
          </div>
          <button type="button" class="btn" id="call-btn">call</button>
        </div>
        <div id="call-result"></div>
      </div>

      <!-- Member list -->
      <div class="member-list" id="member-list"></div>
    </div>
  </div>
</main>

<script>
  let pin = '';
  let currentSlug = '';

  // Auth
  document.getElementById('auth-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    pin = document.getElementById('pin-input').value.trim();
    const errEl = document.getElementById('auth-err');
    errEl.style.display = 'none';

    // Verify pin by loading slugs
    const res = await fetch('/api/table/pool/slugs', { headers: { 'X-Admin-PIN': pin } });
    if (res.status === 401) {
      errEl.textContent = 'incorrect pin.';
      errEl.style.display = 'block';
      return;
    }

    document.getElementById('auth-section').style.display = 'none';
    document.getElementById('board').classList.add('on');

    const data = await res.json();
    const slugs = data.slugs ?? [];
    if (slugs.length) {
      const switcher = document.getElementById('slug-switcher');
      switcher.style.display = 'block';
      const pills = document.getElementById('slug-pills');
      pills.innerHTML = slugs.map(s =>
        `<button class="slug-pill" data-slug="${s.slug}">${s.slug} <span style="color:var(--muted);">(${s.waiting} waiting)</span></button>`
      ).join('');
      pills.querySelectorAll('.slug-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          pills.querySelectorAll('.slug-pill').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('slug-input').value = btn.dataset.slug;
          loadPool(btn.dataset.slug);
        });
      });
    }
  });

  document.getElementById('load-btn').addEventListener('click', function() {
    const slug = document.getElementById('slug-input').value.trim();
    if (slug) loadPool(slug);
  });

  document.getElementById('slug-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      const slug = this.value.trim();
      if (slug) loadPool(slug);
    }
  });

  async function loadPool(slug) {
    currentSlug = slug;
    document.getElementById('pool-content').style.display = 'none';

    const res = await fetch('/api/table/pool?slug=' + encodeURIComponent(slug), {
      headers: { 'X-Admin-PIN': pin }
    });
    if (!res.ok) return;
    const data = await res.json();

    document.getElementById('stat-waiting').textContent = data.waiting ?? 0;
    document.getElementById('stat-total').textContent = data.total ?? 0;

    renderMembers(data.members ?? []);
    document.getElementById('pool-content').style.display = 'block';
  }

  function renderMembers(members) {
    const list = document.getElementById('member-list');
    if (!members.length) {
      list.innerHTML = '<div class="empty">no members yet.</div>';
      return;
    }
    list.innerHTML = members.map(m => {
      const joined = new Date(m.created_at).toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });
      const lastCalled = m.last_called_at
        ? new Date(m.last_called_at).toLocaleDateString('en-CA', { month: 'short', day: 'numeric' })
        : null;
      return `
        <div class="member" data-id="${m.id}">
          <div>
            <div class="member-name">${esc(m.name)}</div>
            <div class="member-email">${esc(m.email)}</div>
          </div>
          <div class="member-meta">
            joined ${joined}<br/>
            ${m.events_attended > 0 ? m.events_attended + ' attended' : 'not yet attended'}<br/>
            ${lastCalled ? 'called ' + lastCalled : ''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.4rem;">
            <span class="member-status ${m.status}">${m.status}</span>
            ${m.status === 'called' ? `<button class="act-btn" onclick="markAttended(${m.id})">attended</button>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  // Send call
  document.getElementById('call-btn').addEventListener('click', async function() {
    const seats = parseInt(document.getElementById('call-seats').value) || 0;
    const note = document.getElementById('call-note').value.trim();
    const resultEl = document.getElementById('call-result');
    if (!currentSlug || seats < 1) return;

    this.disabled = true;
    resultEl.style.display = 'none';

    const res = await fetch('/api/table/pool/call', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': pin },
      body: JSON.stringify({ slug: currentSlug, seats, note }),
    });
    const data = await res.json();
    this.disabled = false;

    if (!res.ok) {
      resultEl.textContent = data.error || 'failed.';
      resultEl.classList.remove('on');
      resultEl.style.display = 'block';
      resultEl.classList.add('on');
      return;
    }

    const names = (data.called ?? []).map(m => m.name).join(', ');
    resultEl.textContent = `called ${data.called.length}: ${names}`;
    resultEl.style.display = 'block';
    resultEl.classList.add('on');
    loadPool(currentSlug);
  });

  async function markAttended(id) {
    await fetch('/api/table/pool/attend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-PIN': pin },
      body: JSON.stringify({ ids: [id] }),
    });
    loadPool(currentSlug);
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
