<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fraise.box / device</title>
<style>
  :root {
    --bone: #f4efe6;
    --oxblood: #4a1519;
    --oxblood-dark: #2e0c0f;
    --brass: #b8874a;
    --brass-dark: #6b4a22;
    --screen-bg: #c8c4b8;
    --screen-ink: #1a1814;
    --screen-dim: #7a7668;
    --ui-muted: #888278;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    background: var(--bone);
    font-family: ui-monospace, "SF Mono", "Menlo", "Consolas", monospace;
    color: var(--oxblood-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    gap: 1.5rem;
  }

  .masthead {
    text-align: center;
    margin-bottom: 0.5rem;
  }

  .masthead h1 {
    font-size: 0.9rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    color: var(--oxblood-dark);
  }

  .masthead .sub {
    font-size: 0.75rem;
    color: var(--ui-muted);
    margin-top: 0.25rem;
  }

  /* Device enclosure — oxblood aluminum body */
  .device {
    position: relative;
    width: min(620px, 92vw);
    aspect-ratio: 3 / 4;
    background: linear-gradient(145deg, var(--oxblood) 0%, var(--oxblood-dark) 100%);
    border-radius: 18px;
    padding: 34px 28px 90px 28px;
    box-shadow:
      0 20px 40px rgba(46, 12, 15, 0.25),
      inset 0 1px 0 rgba(255, 240, 220, 0.06),
      inset 0 -2px 4px rgba(0, 0, 0, 0.4);
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }

  /* Four corner screws */
  .screw {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #5a5048, #2a2420);
    box-shadow: inset 0 1px 1px rgba(0,0,0,0.6), 0 1px 0 rgba(255,240,220,0.1);
  }
  .screw::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 15%;
    right: 15%;
    height: 1px;
    background: #1a1612;
    transform: translateY(-50%);
  }
  .screw.tl { top: 10px; left: 10px; }
  .screw.tr { top: 10px; right: 10px; }
  .screw.bl { bottom: 10px; left: 10px; }
  .screw.br { bottom: 10px; right: 10px; }

  /* Screen — the 1-bit reflective display */
  .screen {
    background: var(--screen-bg);
    border-radius: 4px;
    padding: 16px 14px;
    flex: 1;
    box-shadow:
      inset 0 2px 6px rgba(0, 0, 0, 0.35),
      inset 0 -1px 2px rgba(255, 255, 255, 0.1);
    overflow: hidden;
    position: relative;
  }

  .screen::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.015) 0px,
        rgba(0,0,0,0.015) 1px,
        transparent 1px,
        transparent 3px
      );
    pointer-events: none;
    border-radius: 4px;
  }

  .grid {
    font-family: ui-monospace, "SF Mono", "Menlo", "Consolas", monospace;
    font-size: clamp(9px, 1.6vw, 13px);
    line-height: 1.35;
    color: var(--screen-ink);
    white-space: pre;
    letter-spacing: 0.02em;
    user-select: none;
    position: relative;
    z-index: 1;
  }

  .grid .dim {
    color: var(--screen-dim);
  }

  .grid .cursor {
    background: var(--screen-ink);
    color: var(--screen-bg);
  }

  /* Controls area — below the screen */
  .controls {
    position: absolute;
    bottom: 16px;
    left: 0;
    right: 0;
    padding: 0 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .control-hint {
    font-size: 0.7rem;
    color: rgba(244, 239, 230, 0.45);
    letter-spacing: 0.05em;
  }

  .fraise-mark {
    font-size: 0.7rem;
    color: rgba(244, 239, 230, 0.35);
    letter-spacing: 0.1em;
    text-transform: lowercase;
  }

  /* The brass dial — on the right edge */
  .dial-container {
    position: absolute;
    right: -22px;
    top: 40%;
    transform: translateY(-50%);
    width: 44px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .dial {
    width: 44px;
    height: 120px;
    background: linear-gradient(90deg, var(--brass-dark) 0%, var(--brass) 50%, var(--brass-dark) 100%);
    border-radius: 6px;
    position: relative;
    cursor: grab;
    box-shadow:
      2px 0 6px rgba(0,0,0,0.3),
      inset 1px 0 0 rgba(255,220,160,0.3),
      inset -1px 0 0 rgba(40,20,0,0.4);
  }

  .dial:active {
    cursor: grabbing;
  }

  /* Knurled texture on the dial */
  .dial::before {
    content: "";
    position: absolute;
    inset: 6px 4px;
    background:
      repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.25) 0px,
        rgba(0,0,0,0.25) 1px,
        transparent 1px,
        transparent 3px
      );
    border-radius: 3px;
  }

  .dial-indicator {
    position: absolute;
    left: 50%;
    top: 4px;
    width: 2px;
    height: 4px;
    background: rgba(255,255,220,0.7);
    transform: translateX(-50%);
    border-radius: 1px;
  }

  /* Keyboard hint */
  .keyboard-hint {
    font-size: 0.7rem;
    color: var(--ui-muted);
    text-align: center;
    margin-top: 0.5rem;
    letter-spacing: 0.03em;
  }

  .keyboard-hint kbd {
    display: inline-block;
    padding: 2px 6px;
    background: rgba(74, 21, 25, 0.08);
    border: 1px solid rgba(74, 21, 25, 0.2);
    border-radius: 3px;
    font-family: inherit;
    font-size: 0.65rem;
    margin: 0 2px;
  }

  .footer-links {
    margin-top: 1rem;
    display: flex;
    gap: 1.5rem;
    font-size: 0.75rem;
  }

  .footer-links a {
    color: var(--oxblood);
    text-decoration: none;
    border-bottom: 1px solid rgba(74, 21, 25, 0.2);
    padding-bottom: 2px;
  }

  .footer-links a:hover {
    border-bottom-color: var(--oxblood);
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

<header class="masthead">
  <h1>box fraise / device</h1>
  <div class="sub">virtual fraise.box — a preview of the handheld</div>
</header>

<div class="device" role="application" aria-label="Virtual fraise.box device">
  <div class="screw tl"></div>
  <div class="screw tr"></div>
  <div class="screw bl"></div>
  <div class="screw br"></div>

  <div class="screen">
    <pre class="grid" id="grid"></pre>
  </div>

  <div class="controls">
    <span class="control-hint">◀ back</span>
    <span class="fraise-mark">fraise</span>
    <span class="control-hint">▶ select</span>
  </div>

  <div class="dial-container">
    <div class="dial" id="dial" tabindex="0" aria-label="Rotary dial for navigation">
      <div class="dial-indicator" id="dial-indicator"></div>
    </div>
  </div>
</div>

<div class="keyboard-hint">
  use <kbd>↑</kbd> <kbd>↓</kbd> to navigate &nbsp;·&nbsp; <kbd>↵</kbd> to select &nbsp;·&nbsp; <kbd>esc</kbd> to go back &nbsp;·&nbsp; or drag the dial
</div>

<div class="footer-links">
  <a href="/">← fraise.box</a>
  <a href="/paper">Working Paper</a>
</div>

<script>
  // ============================================================
  // Virtual fraise.box — minimal TUI renderer and navigation
  // ============================================================

  const GRID_COLS = 42;
  const GRID_ROWS = 22;
  const gridEl = document.getElementById('grid');
  const dialEl = document.getElementById('dial');
  const dialIndicator = document.getElementById('dial-indicator');

  // --- Helpers for rendering the TUI grid ----------------------

  function pad(str, len) {
    str = String(str);
    if (str.length >= len) return str.slice(0, len);
    return str + ' '.repeat(len - str.length);
  }

  function center(str, len) {
    str = String(str);
    if (str.length >= len) return str.slice(0, len);
    const space = len - str.length;
    const left = Math.floor(space / 2);
    const right = space - left;
    return ' '.repeat(left) + str + ' '.repeat(right);
  }

  function box(title, lines, footer) {
    const inner = GRID_COLS - 2;
    const out = [];
    // top
    if (title) {
      const t = ' ' + title + ' ';
      const remaining = inner - t.length;
      const left = 1;
      const right = remaining - left;
      out.push('┌─' + t + '─'.repeat(Math.max(0, right - 1)) + '┐');
    } else {
      out.push('┌' + '─'.repeat(inner) + '┐');
    }
    // body
    for (let i = 0; i < GRID_ROWS - 3; i++) {
      const line = lines[i] || '';
      out.push('│' + pad(line, inner) + '│');
    }
    // footer separator + footer
    out.push('├' + '─'.repeat(inner) + '┤');
    out.push('│' + pad(footer || '', inner) + '│');
    out.push('└' + '─'.repeat(inner) + '┘');
    return out.join('\n');
  }

  // --- Application state ---------------------------------------

  let state = {
    screen: 'home',
    cursor: 0,
    identity: 'mf-web-7d9k-2x4p',
    battery: '▓▓▓',
    time: '18:42'
  };

  // --- Screen definitions --------------------------------------

  const screens = {
    home: () => {
      const items = [
        { label: 'credentials', target: 'credentials' },
        { label: 'apps',        target: 'apps' },
        { label: 'games',       target: 'games' },
        { label: 'shop',        target: 'shop' },
        { label: 'paper',       target: 'paper' },
        { label: 'settings',    target: 'settings' },
      ];
      const lines = [''];
      items.forEach((item, i) => {
        const pointer = i === state.cursor ? '▸' : ' ';
        lines.push('  ' + pointer + ' ' + item.label);
      });
      for (let i = lines.length; i < GRID_ROWS - 3; i++) lines.push('');
      return {
        title: 'fraise.box',
        lines,
        footer: '  ◉  ' + state.identity + '          ' + state.time + '  ' + state.battery,
        items
      };
    },

    credentials: () => {
      const lines = [
        '',
        '  identity       ' + state.identity,
        '  issued         2026-04-14',
        '  shop           virtual (web)',
        '',
        '  balance',
        '  ─────────────────────────────────',
        '  usdc           $ 0.00',
        '  fraise credit  ƒ  0.00',
        '',
        '  this is a virtual device. it',
        '  cannot earn physical-presence',
        '  credentials. visit a fraise shop',
        '  to upgrade to a strawberry box.',
        '',
      ];
      while (lines.length < GRID_ROWS - 3) lines.push('');
      return {
        title: 'credentials',
        lines,
        footer: '  ◀ back                    ↻ refresh',
        items: []
      };
    },

    apps: () => {
      const apps = [
        { name: 'field notes',    version: 'v1.2', size: '12k' },
        { name: 'ledger',         version: 'v0.9', size: ' 6k' },
        { name: 'radio',          version: 'v2.0', size: '22k' },
        { name: 'typewriter',     version: 'v1.0', size: ' 8k' },
        { name: 'gardener',       version: 'v0.4', size: '18k' },
        { name: 'minitel reader', version: 'v1.1', size: '14k' },
        { name: 'morse',          version: 'v1.0', size: ' 3k' },
      ];
      const lines = [''];
      apps.forEach((app, i) => {
        const pointer = i === state.cursor ? '▸' : ' ';
        const nameCol = pad(app.name, 20);
        const verCol = pad(app.version, 6);
        lines.push('  ' + pointer + ' ' + nameCol + verCol + '  ' + app.size);
      });
      while (lines.length < GRID_ROWS - 3) lines.push('');
      return {
        title: 'apps',
        lines,
        footer: '  ◀ back   ▶ open      ⊕ install more',
        items: apps.map(a => ({ label: a.name, target: 'app_stub' }))
      };
    },

    games: () => {
      const games = [
        { name: 'orchard',             author: 'austin'  },
        { name: 'the long walk',       author: 'elena'   },
        { name: 'typewriter detective',author: 'jonas'   },
        { name: 'grid',                author: 'm.o.'    },
        { name: 'stanza',              author: 'yuki'    },
        { name: 'radio hour',          author: 'pavel'   },
        { name: 'strawberry thief',    author: 'austin'  },
      ];
      const lines = [''];
      games.forEach((g, i) => {
        const pointer = i === state.cursor ? '▸' : ' ';
        const nameCol = pad(g.name, 26);
        lines.push('  ' + pointer + ' ' + nameCol + 'by ' + g.author);
      });
      while (lines.length < GRID_ROWS - 3) lines.push('');
      return {
        title: 'games',
        lines,
        footer: '  ◀ back   ▶ play       ⊕ get games',
        items: games.map(g => ({ label: g.name, target: 'game_stub' }))
      };
    },

    shop: () => {
      const lines = [
        '',
        '  new this week',
        '  ─────────────────────────────────',
        '  ▸ stanza                   ƒ  4.00',
        '    a poetry generator',
        '',
        '    radio hour               ƒ  6.00',
        '    twelve stations of static',
        '',
        '    the long walk            ƒ  8.00',
        '    an idle walking game',
        '',
        '  featured',
        '  ─────────────────────────────────',
        '    field notes              free',
        '    orchard                  ƒ  2.00',
        '',
      ];
      while (lines.length < GRID_ROWS - 3) lines.push('');
      return {
        title: 'shop',
        lines,
        footer: '  ◀ back   ▶ purchase     balance ƒ 0',
        items: []
      };
    },

    paper: () => {
      const lines = [
        ' § 1 · on closed worlds              ',
        '─────────────────────────────────────',
        '',
        ' a closed world is not a prison. it  ',
        ' is a discipline. the open internet  ',
        ' is a commons that never voted to    ',
        ' become one; its openness is an      ',
        ' accident of engineering that has    ',
        ' been retroactively moralized.       ',
        '',
        ' fraise proposes the opposite: a     ',
        ' deliberate smallness. a field with  ',
        ' a fence. an object you hold that    ',
        ' does not pretend to be a window to  ',
        ' everywhere.                         ',
        '',
      ];
      while (lines.length < GRID_ROWS - 3) lines.push('');
      return {
        title: 'working paper no. 1',
        lines,
        footer: '  ← prev   → next          1 / 14',
        items: []
      };
    },

    settings: () => {
      const items = [
        { label: 'display',       target: 'settings_stub' },
        { label: 'input',         target: 'settings_stub' },
        { label: 'bluetooth',     target: 'settings_stub', note: 'simulated' },
        { label: 'notifications', target: 'settings_stub' },
        { label: 'storage',       target: 'settings_stub', note: '22% used' },
        { label: 'about',         target: 'about' },
      ];
      const lines = [''];
      items.forEach((item, i) => {
        const pointer = i === state.cursor ? '▸' : ' ';
        const nameCol = pad(item.label, 22);
        const note = item.note || '';
        lines.push('  ' + pointer + ' ' + nameCol + note);
      });
      lines.push('');
      lines.push('  ─────────────────────────────────');
      lines.push('');
      lines.push('    device          ' + state.identity);
      lines.push('    os              fraise 0.1.0 (web)');
      lines.push('    runtime         browser');
      while (lines.length < GRID_ROWS - 3) lines.push('');
      return {
        title: 'settings',
        lines,
        footer: '  ◀ back                   ▶ select',
        items
      };
    },

    about: () => {
      const lines = [
        '',
        '  fraise os — web edition',
        '',
        '  this is a virtual fraise.box,',
        '  running in your browser as a',
        '  preview of the handheld device.',
        '',
        '  the physical fraise.box, issued',
        '  at fraise shops, includes a 1-bit',
        '  reflective display, a tactile',
        '  dial, a secure enclave, and mesh',
        '  radios for peer-to-peer',
        '  communication without internet.',
        '',
        '  this virtual version participates',
        '  in the fraise protocol but cannot',
        '  earn physical-presence credentials.',
        '',
      ];
      while (lines.length < GRID_ROWS - 3) lines.push('');
      return {
        title: 'about',
        lines,
        footer: '  ◀ back',
        items: []
      };
    },

    app_stub: () => {
      const lines = [
        '',
        '',
        '',
        '              ◌ ◌ ◌',
        '',
        '         loading preview...',
        '',
        '',
        '  this app would run here in the',
        '  full fraise.box experience.',
        '',
        '  the virtual device demonstrates',
        '  the interface; the full lua',
        '  runtime is coming in stage 2.',
        '',
      ];
      while (lines.length < GRID_ROWS - 3) lines.push('');
      return {
        title: 'app',
        lines,
        footer: '  ◀ back',
        items: []
      };
    },

    game_stub: () => {
      const lines = [
        '',
        ' season: spring        day: 14      ',
        '─────────────────────────────────────',
        '',
        '   ♣  ♣  ♣  .  .  .  ♣  ♣  ♣         ',
        '   ♣  ♣  ♣  .  ✽  .  ♣  ♣  ♣         ',
        '   .  .  .  .  .  .  .  .  .         ',
        '   .  ✿  ✿  .  ☺  .  ✿  ✿  .         ',
        '   .  ✿  ✿  .  .  .  ✿  ✿  .         ',
        '   .  .  .  .  .  .  .  .  .         ',
        '   ≈  ≈  ≈  ≈  ≈  ≈  ≈  ≈  ≈         ',
        '',
        ' > you see a strawberry blossom.    ',
        ' > this is a preview.               ',
        '',
      ];
      while (lines.length < GRID_ROWS - 3) lines.push('');
      return {
        title: 'orchard (preview)',
        lines,
        footer: '  ◀ back',
        items: []
      };
    },

    settings_stub: () => {
      const lines = [
        '',
        '',
        '',
        '           coming in stage 2',
        '',
        '  this settings panel is a preview.',
        '  real settings will be available',
        '  in the next version of the',
        '  virtual device.',
        '',
      ];
      while (lines.length < GRID_ROWS - 3) lines.push('');
      return {
        title: 'settings',
        lines,
        footer: '  ◀ back',
        items: []
      };
    },
  };

  // --- Navigation state machine --------------------------------

  let history = [];

  function render() {
    const screen = screens[state.screen]();
    gridEl.textContent = box(screen.title, screen.lines, screen.footer);
  }

  function currentItems() {
    const screen = screens[state.screen]();
    return screen.items || [];
  }

  function moveCursor(delta) {
    const items = currentItems();
    if (items.length === 0) return;
    state.cursor = (state.cursor + delta + items.length) % items.length;
    render();
  }

  function select() {
    const items = currentItems();
    if (items.length === 0) return;
    const item = items[state.cursor];
    if (!item || !item.target) return;
    history.push({ screen: state.screen, cursor: state.cursor });
    state.screen = item.target;
    state.cursor = 0;
    render();
  }

  function back() {
    if (history.length === 0) return;
    const prev = history.pop();
    state.screen = prev.screen;
    state.cursor = prev.cursor;
    render();
  }

  // --- Keyboard input ------------------------------------------

  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
      e.preventDefault();
      moveCursor(1);
    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
      e.preventDefault();
      moveCursor(-1);
    } else if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      select();
    } else if (e.key === 'Escape' || e.key === 'Backspace') {
      e.preventDefault();
      back();
    }
  });

  // --- Dial input (drag to rotate) ------------------------------

  let dialRotation = 0;
  let dragStartY = null;
  let dragStartRotation = 0;
  let lastDialStep = 0;
  const STEP_SIZE = 24; // pixels per navigation step

  function updateDialVisual() {
    dialIndicator.style.transform =
      `translateX(-50%) rotate(${dialRotation * 12}deg) translateY(${Math.sin(dialRotation * 0.3) * 2}px)`;
  }

  dialEl.addEventListener('pointerdown', (e) => {
    dragStartY = e.clientY;
    dragStartRotation = dialRotation;
    lastDialStep = 0;
    dialEl.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  dialEl.addEventListener('pointermove', (e) => {
    if (dragStartY === null) return;
    const delta = e.clientY - dragStartY;
    dialRotation = dragStartRotation + delta / 3;
    updateDialVisual();

    const step = Math.floor(delta / STEP_SIZE);
    if (step !== lastDialStep) {
      const direction = step > lastDialStep ? 1 : -1;
      moveCursor(direction);
      lastDialStep = step;
    }
  });

  function endDrag() {
    dragStartY = null;
  }

  dialEl.addEventListener('pointerup', endDrag);
  dialEl.addEventListener('pointercancel', endDrag);

  // Double-click the dial to select
  let lastTap = 0;
  dialEl.addEventListener('pointerup', (e) => {
    const now = Date.now();
    if (now - lastTap < 300 && Math.abs((e.clientY || 0) - (dragStartY || 0)) < 5) {
      select();
    }
    lastTap = now;
  });

  // --- Initial render -------------------------------------------

  render();

  // Update time in footer periodically
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    state.time = h + ':' + m;
    if (state.screen === 'home') render();
  }
  setInterval(updateClock, 30000);
  updateClock();
</script>

</body>
</html>
