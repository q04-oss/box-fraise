<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fraise.box / device</title>
<style>
  :root {
    --bg: #8a8680;
    --bg-warm: #a39d93;
    --aluminum: #b5b2ac;
    --aluminum-dark: #85827c;
    --aluminum-shadow: #5a5852;
    --aluminum-highlight: #d8d5cf;
    --titanium: #7a7872;
    --titanium-dark: #4a4844;
    --titanium-highlight: #b0aeaa;

    /* Display palette — hybrid, warm near-black with ink */
    --screen-bg: #0d0c0a;
    --screen-surface: #17140f;
    --screen-border: #2a261f;
    --screen-ink: #f0ead8;
    --screen-muted: #8a8170;
    --screen-dim: #4a4538;
    --screen-accent: #d4a373;
    --screen-focus: #e8dcc0;

    --ink: #2a2824;
    --muted: #5a5852;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: linear-gradient(180deg, var(--bg-warm) 0%, var(--bg) 100%);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    color: var(--ink);
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  body {
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-height: 100vh;
    padding: 1.25rem 1.5rem;
    gap: 1rem;
  }

  .masthead {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    font-family: ui-monospace, "SF Mono", monospace;
  }

  .masthead .sub { color: var(--muted); }
  .masthead a {
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid rgba(42, 40, 36, 0.3);
    padding-bottom: 1px;
  }
  .masthead a:hover { border-bottom-color: var(--ink); }
  .masthead .links { display: flex; gap: 1.25rem; }

  /* Device stage — fills available space */
  .stage {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
    min-width: 0;
    padding: 1rem;
  }

  .device {
    position: relative;
    background:
      radial-gradient(ellipse at 30% 20%, var(--aluminum-highlight) 0%, var(--aluminum) 25%, var(--aluminum-dark) 85%);
    border-radius: 22px;
    padding: clamp(14px, 2vmin, 22px);
    box-shadow:
      0 30px 60px rgba(20, 18, 14, 0.4),
      0 10px 20px rgba(20, 18, 14, 0.3),
      inset 0 1px 0 rgba(255, 252, 245, 0.18),
      inset 0 -1px 0 rgba(0, 0, 0, 0.25);
    aspect-ratio: 1.5 / 1;
    height: 100%;
    max-height: 100%;
    max-width: 100%;
    overflow: visible;
  }

  /* Landscape sizing: fill width or height as needed */
  @media (min-aspect-ratio: 1.5/1) {
    .device { width: auto; height: 100%; }
  }
  @media (max-aspect-ratio: 1.5/1) {
    .device { width: calc(100% - 40px); height: auto; }
  }

  /* Bead-blasted aluminum noise texture */
  .device::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 22px;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(0,0,0,0.025) 1px, transparent 0),
      radial-gradient(circle at 3px 2px, rgba(255,255,255,0.015) 1px, transparent 0);
    background-size: 3px 3px, 5px 5px;
    pointer-events: none;
    z-index: 0;
  }

  /* The display — fills the device body */
  .screen {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 14px;
    background: linear-gradient(160deg, var(--screen-surface) 0%, var(--screen-bg) 100%);
    box-shadow:
      inset 0 2px 8px rgba(0,0,0,0.8),
      inset 0 -1px 3px rgba(80,80,90,0.1),
      0 0 0 1px var(--screen-border);
    overflow: hidden;
    z-index: 1;
  }

  /* Subtle display reflection */
  .screen::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg,
      rgba(255, 240, 200, 0.03) 0%,
      transparent 40%,
      transparent 100%);
    pointer-events: none;
    z-index: 10;
  }

  /* The blossom wheel — embedded on the right short edge */
  .wheel-assembly {
    position: absolute;
    right: clamp(-22px, -2.5vmin, -18px);
    top: 50%;
    transform: translateY(-50%);
    width: clamp(62px, 8vmin, 90px);
    height: clamp(62px, 8vmin, 90px);
    z-index: 2;
  }

  .wheel-well {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 50%,
      rgba(20, 18, 14, 0.6) 0%,
      rgba(0, 0, 0, 0.8) 100%);
    box-shadow:
      inset 0 4px 10px rgba(0,0,0,0.75),
      inset 0 -1px 2px rgba(255,252,245,0.08),
      0 2px 6px rgba(0,0,0,0.4);
  }

  .blossom {
    position: absolute;
    inset: 8%;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
    transform-origin: center;
    transition: transform 0.12s cubic-bezier(0.2, 0.8, 0.3, 1);
  }

  .petal {
    position: absolute;
    top: 4%;
    left: 50%;
    width: 24%;
    height: 42%;
    margin-left: -12%;
    background: linear-gradient(165deg,
      var(--titanium-highlight) 0%,
      var(--titanium) 45%,
      var(--titanium-dark) 90%);
    border-radius: 50% 50% 50% 50% / 70% 70% 30% 30%;
    transform-origin: 50% 100%;
    box-shadow:
      inset 1px 1px 0 rgba(255,255,255,0.25),
      inset -1px -1px 0 rgba(0,0,0,0.35);
  }

  .petal::before {
    content: "";
    position: absolute;
    inset: 2px;
    background: repeating-linear-gradient(
      165deg,
      rgba(255,255,255,0.1) 0px,
      rgba(255,255,255,0.1) 1px,
      rgba(0,0,0,0.1) 1px,
      rgba(0,0,0,0.1) 2px
    );
    border-radius: inherit;
  }

  .petal:nth-child(1)  { transform: rotate(0deg); }
  .petal:nth-child(2)  { transform: rotate(36deg); }
  .petal:nth-child(3)  { transform: rotate(72deg); }
  .petal:nth-child(4)  { transform: rotate(108deg); }
  .petal:nth-child(5)  { transform: rotate(144deg); }
  .petal:nth-child(6)  { transform: rotate(180deg); }
  .petal:nth-child(7)  { transform: rotate(216deg); }
  .petal:nth-child(8)  { transform: rotate(252deg); }
  .petal:nth-child(9)  { transform: rotate(288deg); }
  .petal:nth-child(10) { transform: rotate(324deg); }

  .blossom-center {
    position: absolute;
    width: 22%;
    height: 22%;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%,
      var(--titanium-highlight) 0%,
      var(--titanium) 45%,
      var(--titanium-dark) 100%);
    box-shadow:
      inset 1px 1px 0 rgba(255,255,255,0.3),
      0 1px 2px rgba(0,0,0,0.5);
    z-index: 2;
  }

  /* Wheel interaction area — larger than visible for easier grab */
  .wheel-hitbox {
    position: absolute;
    inset: -20%;
    cursor: grab;
    touch-action: none;
    border-radius: 50%;
    z-index: 3;
  }
  .wheel-hitbox:active { cursor: grabbing; }

  /* ==============================================
     DISPLAY UI — hybrid typography + minimal icons
     ============================================== */

  .ui {
    position: absolute;
    inset: 0;
    padding: clamp(12px, 2vmin, 20px);
    display: flex;
    flex-direction: column;
    color: var(--screen-ink);
    font-size: clamp(11px, 1.4vmin, 14px);
    letter-spacing: 0.01em;
    z-index: 2;
  }

  .ui-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: clamp(8px, 1.2vmin, 12px);
    border-bottom: 1px solid var(--screen-dim);
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 0.75em;
    letter-spacing: 0.1em;
    color: var(--screen-muted);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .ui-header .title {
    color: var(--screen-ink);
  }

  .ui-body {
    flex: 1;
    padding: clamp(12px, 2vmin, 20px) 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .ui-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: clamp(8px, 1.2vmin, 12px);
    border-top: 1px solid var(--screen-dim);
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 0.7em;
    letter-spacing: 0.08em;
    color: var(--screen-muted);
    flex-shrink: 0;
  }

  /* Menu lists */
  .menu {
    display: flex;
    flex-direction: column;
    gap: clamp(2px, 0.4vmin, 6px);
  }

  .menu-item {
    display: flex;
    align-items: center;
    gap: clamp(10px, 1.6vmin, 16px);
    padding: clamp(8px, 1.4vmin, 14px) clamp(10px, 1.6vmin, 16px);
    border-radius: 6px;
    transition: background 0.15s ease;
    font-size: clamp(12px, 1.6vmin, 16px);
    color: var(--screen-ink);
    position: relative;
  }

  .menu-item.focused {
    background: rgba(240, 234, 216, 0.08);
    color: var(--screen-focus);
  }

  .menu-item.focused::before {
    content: "";
    position: absolute;
    left: 0;
    top: 15%;
    bottom: 15%;
    width: 2px;
    background: var(--screen-accent);
    border-radius: 1px;
  }

  .menu-item .icon {
    width: clamp(14px, 1.8vmin, 18px);
    height: clamp(14px, 1.8vmin, 18px);
    opacity: 0.7;
    flex-shrink: 0;
  }

  .menu-item.focused .icon {
    opacity: 1;
  }

  .menu-item .label {
    flex: 1;
  }

  .menu-item .meta {
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 0.75em;
    color: var(--screen-muted);
    letter-spacing: 0.05em;
  }

  /* Detail panels */
  .detail {
    display: flex;
    flex-direction: column;
    gap: clamp(10px, 1.6vmin, 16px);
    font-size: clamp(11px, 1.3vmin, 13px);
    line-height: 1.55;
    color: var(--screen-ink);
  }

  .detail-section {
    display: flex;
    flex-direction: column;
    gap: clamp(4px, 0.6vmin, 8px);
  }

  .detail-label {
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 0.75em;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--screen-muted);
  }

  .detail-value {
    font-size: clamp(14px, 1.8vmin, 18px);
    color: var(--screen-ink);
    font-family: ui-monospace, "SF Mono", monospace;
    letter-spacing: 0.02em;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: clamp(4px, 0.6vmin, 8px) 0;
    border-bottom: 1px solid var(--screen-dim);
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 0.9em;
  }

  .detail-row:last-child { border-bottom: none; }
  .detail-row .k { color: var(--screen-muted); }
  .detail-row .v { color: var(--screen-ink); }

  /* Paper reader */
  .paper-body {
    font-family: "Georgia", "Cormorant Garamond", serif;
    font-size: clamp(12px, 1.5vmin, 15px);
    line-height: 1.65;
    color: var(--screen-ink);
    overflow: hidden;
  }

  .paper-body h2 {
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 0.75em;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--screen-muted);
    margin-bottom: clamp(10px, 1.4vmin, 14px);
  }

  .paper-body p {
    margin-bottom: clamp(8px, 1.2vmin, 12px);
  }

  /* Game view */
  .game-view {
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: clamp(10px, 1.4vmin, 14px);
    line-height: 1.4;
    color: var(--screen-ink);
    white-space: pre;
    display: flex;
    flex-direction: column;
    gap: 0.5em;
  }

  .game-header {
    color: var(--screen-muted);
    border-bottom: 1px solid var(--screen-dim);
    padding-bottom: 0.4em;
    margin-bottom: 0.4em;
    display: flex;
    justify-content: space-between;
    font-size: 0.85em;
  }

  /* Onboarding */
  .onboarding {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: clamp(16px, 2.4vmin, 24px);
    text-align: center;
    padding: clamp(20px, 3vmin, 36px);
  }

  .onboarding .mark {
    font-size: clamp(20px, 3vmin, 32px);
    letter-spacing: 0.35em;
    color: var(--screen-ink);
  }

  .onboarding .step {
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 0.75em;
    letter-spacing: 0.2em;
    color: var(--screen-muted);
    text-transform: uppercase;
  }

  .onboarding p {
    font-size: clamp(12px, 1.4vmin, 14px);
    color: var(--screen-ink);
    max-width: 36ch;
    line-height: 1.55;
  }

  .onboarding .prompt {
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 0.8em;
    color: var(--screen-accent);
    letter-spacing: 0.1em;
    margin-top: clamp(8px, 1.2vmin, 12px);
  }

  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.03em;
    font-family: ui-monospace, "SF Mono", monospace;
  }

  .bottom-bar kbd {
    display: inline-block;
    padding: 1px 5px;
    background: rgba(42, 40, 36, 0.08);
    border: 1px solid rgba(42, 40, 36, 0.2);
    border-radius: 3px;
    font-family: inherit;
    font-size: 0.65rem;
    margin: 0 1px;
  }

  .bottom-bar .hint { flex: 1; text-align: center; }

  @media (max-width: 720px) {
    body { padding: 0.75rem 1rem; gap: 0.5rem; }
    .masthead .sub { display: none; }
    .bottom-bar .hint { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    .blossom { transition: none !important; }
  }
</style>
</head>
<body>

<header class="masthead">
  <span>box fraise / device</span>
  <span class="sub">virtual fraise.box — v0.2 simulator</span>
  <span class="links">
    <a href="/">← fraise.box</a>
    <a href="/paper">paper</a>
  </span>
</header>

<div class="stage">
  <div class="device" role="application" aria-label="Virtual fraise.box device">
    <div class="screen">
      <div class="ui" id="ui"><!-- dynamic --></div>
    </div>

    <div class="wheel-assembly">
      <div class="wheel-well"></div>
      <div class="blossom" id="blossom">
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="blossom-center"></div>
      </div>
      <div class="wheel-hitbox" id="wheel" tabindex="0" aria-label="Blossom wheel for navigation"></div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <span>mf-web-7d9k-2x4p</span>
  <span class="hint">
    roll the blossom wheel or use <kbd>↑</kbd><kbd>↓</kbd> to navigate &nbsp; <kbd>↵</kbd> select &nbsp; <kbd>esc</kbd> back
  </span>
  <span id="clock">—</span>
</div>

<script>
  // =============================================================
  // fraise.box v2 — full interactive simulator
  // =============================================================

  const ui = document.getElementById('ui');
  const blossom = document.getElementById('blossom');
  const wheel = document.getElementById('wheel');
  const clockEl = document.getElementById('clock');

  // --- Icon definitions (minimal, restrained SVG icons) --------

  const icons = {
    credentials: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="6" width="18" height="12" rx="2"/><circle cx="9" cy="12" r="2"/><line x1="14" y1="10" x2="19" y2="10"/><line x1="14" y1="14" x2="17" y2="14"/></svg>',
    apps: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',
    games: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="20" height="12" rx="3"/><line x1="7" y1="11" x2="7" y2="15"/><line x1="5" y1="13" x2="9" y2="13"/><circle cx="16" cy="11" r="0.8" fill="currentColor"/><circle cx="18" cy="14" r="0.8" fill="currentColor"/></svg>',
    shop: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 7h16l-1.5 11a2 2 0 0 1-2 1.8h-9a2 2 0 0 1-2-1.8L4 7z"/><path d="M8 7V5a4 4 0 0 1 8 0v2"/></svg>',
    paper: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 3h9l4 4v14H6z"/><polyline points="15 3 15 7 19 7"/><line x1="9" y1="13" x2="16" y2="13"/><line x1="9" y1="17" x2="14" y2="17"/></svg>',
    camera: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 7h3l2-2h6l2 2h3v12H4z"/><circle cx="12" cy="13" r="4"/></svg>',
    mesh: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="5" cy="12" r="2"/><circle cx="19" cy="6" r="2"/><circle cx="19" cy="18" r="2"/><circle cx="12" cy="12" r="2"/><line x1="7" y1="12" x2="10" y2="12"/><line x1="14" y1="12" x2="17" y2="7"/><line x1="14" y1="12" x2="17" y2="17"/></svg>',
    settings: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>',
    about: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><line x1="12" y1="11" x2="12" y2="16"/><circle cx="12" cy="8" r="0.8" fill="currentColor"/></svg>',
    back: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="14 6 8 12 14 18"/></svg>',
  };

  // --- State ---------------------------------------------------

  let state = {
    screen: 'home',
    cursor: 0,
    identity: 'mf-web-7d9k-2x4p',
    battery: 86,
    time: '18:42',
    booted: false,
    onboardingStep: 0,
  };

  let history = [];
  let wheelRotation = 0;

  // --- Screens -------------------------------------------------

  const screens = {

    home: () => ({
      header: { title: 'fraise.box', right: state.time },
      footer: { left: state.identity, right: 'battery ' + state.battery + '%' },
      items: [
        { icon: 'credentials', label: 'credentials', target: 'credentials' },
        { icon: 'apps',        label: 'apps',        target: 'apps', meta: '7' },
        { icon: 'games',       label: 'games',       target: 'games', meta: '7' },
        { icon: 'camera',      label: 'camera',      target: 'camera' },
        { icon: 'mesh',        label: 'mesh',        target: 'mesh', meta: '0 nearby' },
        { icon: 'shop',        label: 'shop',        target: 'shop' },
        { icon: 'paper',       label: 'paper',       target: 'paper' },
        { icon: 'settings',    label: 'settings',    target: 'settings' },
      ],
      render: renderMenu,
    }),

    credentials: () => ({
      header: { title: 'credentials', right: '◀ back' },
      footer: { left: 'this device holds one identity', right: '' },
      items: [],
      render: () => {
        return `
          <div class="detail">
            <div class="detail-section">
              <div class="detail-label">identity</div>
              <div class="detail-value">${state.identity}</div>
            </div>
            <div class="detail-section">
              <div class="detail-label">issuance</div>
              <div class="detail-row"><span class="k">issued</span><span class="v">2026-04-14</span></div>
              <div class="detail-row"><span class="k">shop</span><span class="v">virtual (web)</span></div>
              <div class="detail-row"><span class="k">tier</span><span class="v">web credential</span></div>
            </div>
            <div class="detail-section">
              <div class="detail-label">balance</div>
              <div class="detail-row"><span class="k">usdc</span><span class="v">$ 0.00</span></div>
              <div class="detail-row"><span class="k">fraise credit</span><span class="v">ƒ 0.00</span></div>
            </div>
          </div>
        `;
      }
    }),

    apps: () => ({
      header: { title: 'apps', right: '◀ back' },
      footer: { left: 'roll to browse', right: '' },
      items: [

  // --- Render helpers ------------------------------------------

  function renderMenu(screenDef) {
    const items = screenDef.items.map((item, i) => {
      const focused = i === state.cursor ? ' focused' : '';
      const icon = icons[item.icon] || '';
      const meta = item.meta ? `<span class="meta">${item.meta}</span>` : '';
      return `
        <div class="menu-item${focused}">
          ${icon}
          <span class="label">${item.label}</span>
          ${meta}
        </div>
      `;
    }).join('');
    return `<div class="menu">${items}</div>`;
  }

  function render() {
    const screenDef = screens[state.screen]();
    let bodyHtml;
    if (screenDef.items.length > 0 && !screenDef.render.toString().includes('detail')) {
      bodyHtml = renderMenu(screenDef);
    } else {
      bodyHtml = screenDef.render(screenDef);
    }
    ui.innerHTML = `
      <div class="ui-header">
        <span class="title">${screenDef.header.title}</span>
        <span>${screenDef.header.right || ''}</span>
      </div>
      <div class="ui-body">${bodyHtml}</div>
      <div class="ui-footer">
        <span>${screenDef.footer.left || ''}</span>
        <span>${screenDef.footer.right || ''}</span>
      </div>
    `;
  }

  // --- Navigation ---------------------------------------------

  function currentItems() {
    return screens[state.screen]().items || [];
  }

  function moveCursor(delta) {
    const items = currentItems();
    if (items.length === 0) return;
    state.cursor = (state.cursor + delta + items.length) % items.length;
    render();
  }

  function select() {
    const items = currentItems();
    if (items.length === 0) return;
    const item = items[state.cursor];
    if (!item || !item.target) return;
    history.push({ screen: state.screen, cursor: state.cursor });
    state.screen = item.target;
    state.cursor = 0;
    render();
  }

  function back() {
    if (history.length === 0) return;
    const prev = history.pop();
    state.screen = prev.screen;
    state.cursor = prev.cursor;
    render();
  }

  // --- Keyboard -----------------------------------------------

  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); moveCursor(1); rotateBlossom(12); }
    else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); moveCursor(-1); rotateBlossom(-12); }
    else if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); select(); pulseBlossom(); }
    else if (e.key === 'Escape' || e.key === 'Backspace') { e.preventDefault(); back(); }
  });

  // --- Wheel rotation + input ---------------------------------

  function rotateBlossom(degrees) {
    wheelRotation += degrees;
    blossom.style.transform = `rotate(${wheelRotation}deg)`;
  }

  function pulseBlossom() {
    const original = wheelRotation;
    blossom.style.transition = 'transform 0.08s ease-out';
    blossom.style.transform = `rotate(${original}deg) scale(0.94)`;
    setTimeout(() => {
      blossom.style.transform = `rotate(${original}deg) scale(1)`;
      setTimeout(() => {
        blossom.style.transition = 'transform 0.12s cubic-bezier(0.2, 0.8, 0.3, 1)';
      }, 150);
    }, 80);
  }

  let dragStartY = null;
  let dragStartRotation = 0;
  let lastStep = 0;
  let lastTap = 0;
  const STEP_SIZE = 28;

  wheel.addEventListener('pointerdown', (e) => {
    dragStartY = e.clientY;
    dragStartRotation = wheelRotation;
    lastStep = 0;
    wheel.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  wheel.addEventListener('pointermove', (e) => {
    if (dragStartY === null) return;
    const delta = e.clientY - dragStartY;
    wheelRotation = dragStartRotation + delta * 0.8;
    blossom.style.transform = `rotate(${wheelRotation}deg)`;
    const step = Math.floor(delta / STEP_SIZE);
    if (step !== lastStep) {
      const direction = step > lastStep ? 1 : -1;
      moveCursor(direction);
      lastStep = step;
    }
  });

  function endDrag(e) {
    const moved = dragStartY !== null ? Math.abs((e.clientY || 0) - dragStartY) : 999;
    const now = Date.now();
    if (moved < 5 && now - lastTap < 300) {
      select();
      pulseBlossom();
    }
    if (moved < 5) lastTap = now;
    dragStartY = null;
  }

  wheel.addEventListener('pointerup', endDrag);
  wheel.addEventListener('pointercancel', endDrag);

  // Mouse wheel on the wheel element scrolls through items
  wheel.addEventListener('wheel', (e) => {
    e.preventDefault();
    const direction = e.deltaY > 0 ? 1 : -1;
    moveCursor(direction);
    rotateBlossom(direction * 10);
  }, { passive: false });

  // --- Clock --------------------------------------------------

  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    state.time = h + ':' + m;
    clockEl.textContent = state.time;
    if (state.screen === 'home') render();
  }
  setInterval(updateClock, 30000);
  updateClock();

  // --- Initial render ------------------------------------------

  render();
</script>
