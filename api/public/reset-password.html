<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>box fraise — reset password</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FFFFFF; --text: #1C1C1E; --muted: #8E8E93;
      --border: #E5E1DA; --card: #F7F5F2; --input: #F0EDE8;
    }
    html { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; -webkit-font-smoothing: antialiased; }
    body { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .wrap { width: 100%; max-width: 380px; }
    nav { margin-bottom: 2.5rem; }
    nav a { font-size: 0.75rem; color: var(--muted); text-decoration: none; letter-spacing: 0.05em; }
    nav a:hover { color: var(--text); }
    .eyebrow { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    h1 { font-size: 1rem; font-weight: 500; margin-bottom: 0.5rem; }
    .sub { font-size: 0.78rem; color: var(--muted); line-height: 1.7; margin-bottom: 2rem; }
    .form { display: flex; flex-direction: column; gap: 0.75rem; }
    label { font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 0.25rem; }
    input { width: 100%; font-family: 'DM Mono', monospace; font-size: 0.85rem; background: var(--input); border: 1px solid var(--border); border-radius: 8px; padding: 0.65rem 0.9rem; color: var(--text); outline: none; transition: border-color 0.15s; }
    input:focus { border-color: var(--text); background: var(--bg); }
    .btn { width: 100%; font-family: 'DM Mono', monospace; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; background: var(--text); color: var(--bg); border: none; border-radius: 9999px; padding: 0.75rem; cursor: pointer; transition: opacity 0.15s; margin-top: 0.25rem; }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .error { font-size: 0.72rem; color: #c0392b; display: none; }
    .error.visible { display: block; }
    .success { display: none; flex-direction: column; gap: 0.75rem; }
    .success.visible { display: flex; }
    .success-mark { font-size: 1.25rem; }
    .success-title { font-size: 0.9rem; font-weight: 500; }
    .success-sub { font-size: 0.75rem; color: var(--muted); line-height: 1.7; }
  </style>
</head>
<body>
  <div class="wrap">
    <nav><a href="/join">← sign in</a></nav>

    <div id="reset-view">
      <div class="eyebrow">box fraise</div>
      <h1 id="page-title">reset password.</h1>
      <p class="sub" id="page-sub">enter your new password below.</p>

      <div class="form" id="reset-form">
        <div>
          <label for="new-password">new password</label>
          <input type="password" id="new-password" placeholder="at least 8 characters" autocomplete="new-password" />
        </div>
        <div>
          <label for="confirm-password">confirm password</label>
          <input type="password" id="confirm-password" placeholder="repeat password" autocomplete="new-password" />
        </div>
        <div class="error" id="reset-error"></div>
        <button class="btn" id="reset-btn">set new password</button>
      </div>

      <div class="success" id="reset-success">
        <div class="success-mark">✓</div>
        <div class="success-title">password updated.</div>
        <div class="success-sub">you can now <a href="/join" style="color:var(--text);">sign in</a> with your new password.</div>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('page-title').textContent = 'invalid link.';
      document.getElementById('page-sub').textContent = 'this reset link is missing or invalid. request a new one from the sign in page.';
      document.getElementById('reset-form').style.display = 'none';
    }

    document.getElementById('reset-btn').addEventListener('click', async () => {
      const password = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      const errEl = document.getElementById('reset-error');
      errEl.classList.remove('visible');

      if (!password) { errEl.textContent = 'password is required.'; errEl.classList.add('visible'); return; }
      if (password.length < 8) { errEl.textContent = 'password must be at least 8 characters.'; errEl.classList.add('visible'); return; }
      if (password !== confirm) { errEl.textContent = 'passwords do not match.'; errEl.classList.add('visible'); return; }

      const btn = document.getElementById('reset-btn');
      btn.disabled = true; btn.textContent = 'saving —';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error ?? 'Reset failed');

        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('reset-success').classList.add('visible');
      } catch (err) {
        errEl.textContent = err.message ?? 'something went wrong.';
        errEl.classList.add('visible');
        btn.disabled = false; btn.textContent = 'set new password';
      }
    });
  </script>
</body>
</html>
